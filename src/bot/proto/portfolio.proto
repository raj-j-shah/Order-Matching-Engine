syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.ordermatching.proto.portfolio";
option java_outer_classname = "PortfolioProto";

package portfolio;

// ========================
// Portfolio Service
// ========================

service PortfolioService {
  rpc GetBalances (GetBalancesRequest) returns (BalancesResponse);
  rpc GetTradeHistory (GetTradeHistoryRequest) returns (TradeHistoryResponse);
  rpc ModifyBalance (ModifyBalanceRequest) returns (ModifyBalanceResponse);
}

message GetBalancesRequest {
  string account_id = 1;
}

message GetTradeHistoryRequest {
  string account_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string symbol_id = 4; // optional filter
}

message AssetBalance {
  string asset = 1;
  double available = 2;
  double locked = 3;
}

message BalancesResponse {
  string account_id = 1;
  repeated AssetBalance balances = 2;
}

message TradeRecord {
  string trade_id = 1;
  string order_id = 2;
  string symbol_id = 3;
  string side = 4;
  double price = 5;
  double quantity = 6;
  int64 timestamp = 7;
  string buyer_id = 8;
  string seller_id = 9;
}

message TradeHistoryResponse {
  repeated TradeRecord trades = 1;
  int32 total_count = 2;
}

message ModifyBalanceRequest {
  string account_id = 1;
  string asset = 2;
  double amount = 3;
}

message ModifyBalanceResponse {
  bool success = 1;
}

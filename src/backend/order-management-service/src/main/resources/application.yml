spring:
  application:
    name: order-management-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ome_db}
    username: ${SPRING_DATASOURCE_USERNAME:ome_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ome_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9004}

logging:
  level:
    com.ordermatching: INFO

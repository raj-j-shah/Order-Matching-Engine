syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.ordermatching.proto.matching";
option java_outer_classname = "MatchingProto";

package matching;

service MatchingService {
  rpc GetOrderBookSnapshot (GetOrderBookRequest) returns (OrderBookResponse);
}

message GetOrderBookRequest {
  string symbol_id = 1;
}

message PriceLevel {
  double price = 1;
  double quantity = 2;
}

message OrderBookResponse {
  string symbol_id = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
  int64 timestamp = 4;
}

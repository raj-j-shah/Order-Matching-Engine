version: '3.9'

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ome-postgres
    environment:
      POSTGRES_USER: ome_user
      POSTGRES_PASSWORD: ome_password
      POSTGRES_DB: ome_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ome_user -d ome_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ome-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ome-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ome-network
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ome-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ome-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ome-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ome-network

  # ─────────────────────────────────────────
  # BACKEND MICROSERVICES
  # ─────────────────────────────────────────
  account-service:
    build:
      context: ./src/backend/account-service
      dockerfile: Dockerfile
    container_name: ome-account-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9001:9001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ome_db
      SPRING_DATASOURCE_USERNAME: ome_user
      SPRING_DATASOURCE_PASSWORD: ome_password
      GRPC_SERVER_PORT: 9001
    networks:
      - ome-network

  market-data-service:
    build:
      context: ./src/backend/market-data-service
      dockerfile: Dockerfile
    container_name: ome-market-data-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "9002:9002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ome_db
      SPRING_DATASOURCE_USERNAME: ome_user
      SPRING_DATASOURCE_PASSWORD: ome_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9002
    networks:
      - ome-network

  matching-engine-service:
    build:
      context: ./src/backend/matching-engine-service
      dockerfile: Dockerfile
    container_name: ome-matching-engine-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - ome-network

  order-management-service:
    build:
      context: ./src/backend/order-management-service
      dockerfile: Dockerfile
    container_name: ome-order-management-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "9004:9004"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ome_db
      SPRING_DATASOURCE_USERNAME: ome_user
      SPRING_DATASOURCE_PASSWORD: ome_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9004
    networks:
      - ome-network

  realtime-updates-service:
    build:
      context: ./src/backend/realtime-updates-service
      dockerfile: Dockerfile
    container_name: ome-realtime-updates-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - ome-network

  portfolio-service:
    build:
      context: ./src/backend/portfolio-service
      dockerfile: Dockerfile
    container_name: ome-portfolio-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "9006:9006"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ome_db
      SPRING_DATASOURCE_USERNAME: ome_user
      SPRING_DATASOURCE_PASSWORD: ome_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9006
    networks:
      - ome-network

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    container_name: ome-envoy
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "8080:8080"
      - "9901:9901"
    depends_on:
      - account-service
      - market-data-service
      - order-management-service
      - portfolio-service
    networks:
      - ome-network

  # ─────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────
  ome-bot:
    build:
      context: ./src/bot
    container_name: ome-bot
    environment:
      - MARKET_DATA_URL=market-data-service:9002
      - KAFKA_BROKERS=kafka:29092
      - ENABLE_BOT=true # Set to "true" to enable the trading bot
    depends_on:
      kafka:
        condition: service_healthy
      market-data-service:
        condition: service_started
    networks:
      - ome-network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: ome-frontend
    ports:
      - "3000:80"
    depends_on:
      - realtime-updates-service
    networks:
      - ome-network

volumes:
  postgres_data:

networks:
  ome-network:
    driver: bridge
